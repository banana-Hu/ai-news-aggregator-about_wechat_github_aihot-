<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Aggregator</title>
  <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/app.css" rel="stylesheet">
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">N</div>
      <div class="sidebar-brand-text">AI News</div>
      <div class="sidebar-brand-dot" title="运行中"></div>
    </div>

    <nav class="sidebar-nav">
      <a href="/" class="{{ 'active' if current_page == '/' else '' }}">
        <i class="bi bi-speedometer2"></i>概览
      </a>
      <a href="/fetch" class="{{ 'active' if current_page == '/fetch' else '' }}">
        <i class="bi bi-cloud-download"></i>数据抓取
      </a>
      <a href="/push" class="{{ 'active' if current_page == '/push' else '' }}">
        <i class="bi bi-send"></i>推送
      </a>
      <a href="/subscriptions" class="{{ 'active' if current_page == '/subscriptions' else '' }}">
        <i class="bi bi-people"></i>订阅管理
      </a>
      <a href="/settings" class="{{ 'active' if current_page == '/settings' else '' }}">
        <i class="bi bi-gear"></i>设置
      </a>
    </nav>

    <div class="sidebar-footer">
      <span>v0.1.0</span>
      <span class="status-ok">运行中</span>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const colors = { ok: '#22C55E', err: '#EF4444', warn: '#F59E0B', info: '#4F7CFF' };
  const bg = colors[type] || '#4F7CFF';
  const t = document.createElement('div');
  t.className = 'toast-item';
  t.style.color = bg;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 5000);
}

function toggleLoading(btn, loading, origText) {
  if (loading) {
    btn._origHTML = btn.innerHTML;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>' + origText;
    btn.classList.add('btn-loading');
  } else {
    btn.innerHTML = btn._origHTML || origText;
    btn.classList.remove('btn-loading');
  }
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
